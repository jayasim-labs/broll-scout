AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: B-Roll Scout — DynamoDB, Lambda, HTTP API, Secrets Manager, optional custom domain (us-east-1)

Globals:
  Function:
    Timeout: 900
    MemorySize: 2048
    Runtime: python3.13
    Architectures:
      - x86_64
    Environment:
      Variables:
        DYNAMODB_TABLE_PREFIX: !Ref TablePrefix
        DEBUG: "false"
        SECRETS_ARN: !Ref AppSecrets

Parameters:
  TablePrefix:
    Type: String
    Default: broll_
    Description: Prefix for all DynamoDB table names (must match app config)

  CustomDomainName:
    Type: String
    Default: broll.jayasim.com
    Description: API hostname (used when ACM certificate ARN is set)

  AcmCertificateArn:
    Type: String
    Default: ""
    Description: ACM certificate ARN in us-east-1, must cover CustomDomainName (DNS or email validated). Leave empty to skip custom domain.

  HostedZoneId:
    Type: String
    Default: ""
    Description: Route 53 hosted zone ID for jayasim.com (optional). If set with ACM, creates A alias to API Gateway.

Conditions:
  UseCustomDomain: !Not [!Equals [!Ref AcmCertificateArn, ""]]
  UseRoute53Alias: !And
    - !Condition UseCustomDomain
    - !Not [!Equals [!Ref HostedZoneId, ""]]

Resources:
  AppSecrets:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "broll-scout/${AWS::StackName}/app-keys"
      Description: Third-party API keys for B-Roll Scout — set values after deploy (Console or CLI)
      SecretString: '{"OPENAI_API_KEY":"","GEMINI_API_KEY":"","YOUTUBE_API_KEY":"","GOOGLE_SEARCH_API_KEY":"","GOOGLE_SEARCH_CX":"","API_KEY":""}'

  JobsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${TablePrefix}jobs"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: job_id
          AttributeType: S
      KeySchema:
        - AttributeName: job_id
          KeyType: HASH

  SegmentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${TablePrefix}segments"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: job_id
          AttributeType: S
        - AttributeName: segment_id
          AttributeType: S
      KeySchema:
        - AttributeName: job_id
          KeyType: HASH
        - AttributeName: segment_id
          KeyType: RANGE

  ResultsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${TablePrefix}results"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: job_id
          AttributeType: S
        - AttributeName: result_id
          AttributeType: S
        - AttributeName: video_id
          AttributeType: S
      KeySchema:
        - AttributeName: job_id
          KeyType: HASH
        - AttributeName: result_id
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: video_id-index
          KeySchema:
            - AttributeName: video_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  TranscriptsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${TablePrefix}transcripts"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: video_id
          AttributeType: S
        - AttributeName: transcript_source
          AttributeType: S
      KeySchema:
        - AttributeName: video_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: transcript_source-index
          KeySchema:
            - AttributeName: transcript_source
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  FeedbackTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${TablePrefix}feedback"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: result_id
          AttributeType: S
      KeySchema:
        - AttributeName: result_id
          KeyType: HASH

  SettingsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${TablePrefix}settings"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: setting_key
          AttributeType: S
      KeySchema:
        - AttributeName: setting_key
          KeyType: HASH

  ChannelCacheTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${TablePrefix}channel_cache"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: channel_id
          AttributeType: S
      KeySchema:
        - AttributeName: channel_id
          KeyType: HASH

  BrollHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowCredentials: false
        AllowHeaders:
          - "*"
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        AllowOrigins:
          - "*"

  BrollApiDomain:
    Type: AWS::ApiGatewayV2::DomainName
    Condition: UseCustomDomain
    Properties:
      DomainName: !Ref CustomDomainName
      DomainNameConfigurations:
        - CertificateArn: !Ref AcmCertificateArn
          EndpointType: REGIONAL
          SecurityPolicy: TLS_1_2

  BrollApiMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Condition: UseCustomDomain
    Properties:
      ApiId: !Ref BrollHttpApi
      DomainName: !Ref BrollApiDomain
      Stage: "$default"

  BrollApiDnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: UseRoute53Alias
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref CustomDomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt BrollApiDomain.RegionalDomainName
        HostedZoneId: !GetAtt BrollApiDomain.RegionalHostedZoneId
        EvaluateTargetHealth: false

  BrollApiFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      FunctionName: !Sub "broll-scout-api-${AWS::StackName}"
      Handler: app.main.handler
      CodeUri: .
      Description: B-Roll Scout FastAPI (Mangum); keys from Secrets Manager via SECRETS_ARN
      Policies:
        - Statement:
            - Sid: DynamoDBAppTables
              Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:DeleteItem
                - dynamodb:Query
                - dynamodb:Scan
                - dynamodb:BatchGetItem
                - dynamodb:BatchWriteItem
                - dynamodb:DescribeTable
              Resource:
                - !GetAtt JobsTable.Arn
                - !GetAtt SegmentsTable.Arn
                - !GetAtt ResultsTable.Arn
                - !Sub "${ResultsTable.Arn}/index/*"
                - !GetAtt TranscriptsTable.Arn
                - !Sub "${TranscriptsTable.Arn}/index/*"
                - !GetAtt FeedbackTable.Arn
                - !GetAtt SettingsTable.Arn
                - !GetAtt ChannelCacheTable.Arn
        - Statement:
            - Sid: ReadAppSecrets
              Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref AppSecrets
      Events:
        RootAny:
          Type: HttpApi
          Properties:
            ApiId: !Ref BrollHttpApi
            Path: /
            Method: ANY
        ProxyPlus:
          Type: HttpApi
          Properties:
            ApiId: !Ref BrollHttpApi
            Path: /{proxy+}
            Method: ANY

Outputs:
  HttpApiUrl:
    Description: Default invoke URL (use CustomApiUrl when custom domain is configured)
    Value: !Sub "https://${BrollHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  CustomApiUrl:
    Condition: UseCustomDomain
    Description: Public API URL with custom domain
    Value: !Sub "https://${CustomDomainName}"
  ApiGatewayRegionalTarget:
    Condition: UseCustomDomain
    Description: If not using Route53 in this stack, create CNAME/ALIAS to this hostname
    Value: !GetAtt BrollApiDomain.RegionalDomainName
  AppSecretsArn:
    Description: Put JSON keys here (see infra/README.md)
    Value: !Ref AppSecrets
  HttpApiId:
    Value: !Ref BrollHttpApi
  LambdaArn:
    Value: !GetAtt BrollApiFunction.Arn
  JobsTableName:
    Value: !Ref JobsTable
