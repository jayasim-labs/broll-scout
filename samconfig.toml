# Default deploy target: us-east-1. Override with `sam deploy --guided` or CLI flags.
version = 0.1

[default.global.parameters]
stack_name = "broll-scout"
region = "us-east-1"
confirm_changeset = true
capabilities = "CAPABILITY_IAM"

[default.build.parameters]
cached = true
parallel = true

[default.deploy.parameters]
stack_name = "broll-scout"
region = "us-east-1"
capabilities = "CAPABILITY_IAM"
resolve_s3 = true
